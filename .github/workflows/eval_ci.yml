name: LLM Eval — Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      model_version:
        description: "Model version identifier"
        required: false
        default: "qwen2.5"

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Lint + type check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dev deps
        run: pip install ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy eval/ store/ ci/ --ignore-missing-imports

  # ─── Unit tests ───────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/unit/ -v --tb=short

  # ─── Quality Gate (integration — needs live services) ─────────────────────────
  quality-gate:
    name: RAG Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    # Only run on push to main or manual trigger (not on every PR to avoid rate limits)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eval_user
          POSTGRES_PASSWORD: eval_pass
          POSTGRES_DB: eval_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      EVAL_POSTGRES_HOST: localhost
      EVAL_POSTGRES_PORT: 5433
      EVAL_POSTGRES_USER: eval_user
      EVAL_POSTGRES_PASSWORD: eval_pass
      EVAL_POSTGRES_DB: eval_db
      JUDGE_BACKEND: anthropic
      JUDGE_MODEL: claude-haiku-4-5-20251001
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RAG_BASE_URL: ${{ secrets.RAG_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e .

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run quality gate
        run: |
          python ci/quality_gate.py \
            --model "${{ github.event.inputs.model_version || 'qwen2.5' }}" \
            --threshold 0.05

      - name: Upload eval results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: data/
          retention-days: 30
